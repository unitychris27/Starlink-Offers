kind = "web"
previewPath = "/"
title = "Airtel Congo Internet Portal"
version = "1.0.0"
id = "artifacts/airtel-portal"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23628

[services.development]
run = "pnpm --filter @workspace/airtel-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/airtel-portal", "run", "build" ]
serve = "static"
publicDir = "artifacts/airtel-portal/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23628"
BASE_PATH = "/"
